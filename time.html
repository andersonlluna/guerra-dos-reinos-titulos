<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080A0E">
    <title>Conquistas — Guerra dos Reinos</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --amber: #C8860A; --amber-light: #E8A020; --amber-dim: #8A5C06;
            --bg-deep: #080A0E; --bg-card: rgba(14,17,26,0.98);
            --border: rgba(200,134,10,0.18);
            --text: #DDD5C8; --text-bright: #EDE8E0; --text-muted: #6B6878;
            --lord-color: #C8860A;
        }
        body {
            font-family: 'Crimson Text', Georgia, serif;
            background: var(--bg-deep);
            color: var(--text); min-height: 100vh; padding-bottom: 60px;
        }

        /* LOADING */
        #loading {
            position:fixed; inset:0; background:var(--bg-deep);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:999; gap:16px;
        }
        .loading-icon { font-size:3em; animation:pulse 1.3s ease-in-out infinite; }
        .loading-text { font-family:'Cinzel',serif; color:var(--amber-light); font-size:.95em; letter-spacing:.12em; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.88)} }

        /* BACK */
        .back-bar {
            padding:14px 16px;
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .back-link {
            display:inline-flex; align-items:center; gap:6px;
            font-family:'Cinzel',serif; font-size:.75em; color:var(--text-muted);
            text-decoration:none; transition:color .2s;
        }
        .back-link:hover { color:var(--amber); }

        /* HERO */
        .hero {
            padding: 36px 20px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content:'';
            position:absolute; inset:0;
            background: radial-gradient(ellipse 70% 60% at 50% 0%,
                rgba(var(--lord-r),var(--lord-g),var(--lord-b),0.12) 0%, transparent 70%);
            pointer-events:none;
        }
        .hero-color-bar {
            position:absolute; top:0; left:0; right:0; height:4px;
        }
        .hero-avatar { font-size:3.5em; margin-bottom:12px; line-height:1; }
        .hero-name {
            font-family:'Cinzel',serif; font-size:clamp(1.5em,5vw,2.2em); font-weight:900;
            color:var(--text-bright); letter-spacing:.06em; margin-bottom:4px;
        }
        .hero-house { font-size:.95em; font-weight:600; margin-bottom:10px; }
        .hero-alliance {
            display:inline-block; font-family:'Cinzel',serif; font-size:.72em;
            padding:3px 12px; border-radius:3px; font-weight:700; letter-spacing:.04em;
            margin-bottom:20px;
        }
        .tag-bastardos { background:rgba(90,100,112,0.18); border:1px solid rgba(176,190,197,0.35); color:#9AAAB8; }
        .tag-anel      { background:rgba(28,78,58,0.18);  border:1px solid rgba(46,122,88,0.4);  color:#3A8A66; }

        /* PRIMARY TITLE CARD */
        .primary-title-card {
            max-width:440px; margin:0 auto 8px;
            background: var(--bg-card);
            border:1px solid var(--border);
            border-radius:10px; overflow:hidden;
            box-shadow:0 12px 40px rgba(0,0,0,0.6);
        }
        .ptc-img {
            width:100%; aspect-ratio:1/1; max-height:220px;
            object-fit:cover; display:block;
            background:rgba(200,134,10,0.05);
        }
        .ptc-img-placeholder {
            width:100%; height:160px;
            display:flex; align-items:center; justify-content:center;
            font-size:4em; opacity:.2;
            background:rgba(200,134,10,0.04);
        }
        .ptc-body { padding:16px 20px 20px; }
        .ptc-label {
            font-family:'Cinzel',serif; font-size:.68em; color:var(--text-muted);
            letter-spacing:.16em; text-transform:uppercase; margin-bottom:6px;
        }
        .ptc-title {
            font-family:'Cinzel',serif; font-size:1.2em; font-weight:900;
            color:var(--amber-light); line-height:1.25;
        }

        /* PONTOS STRIP */
        .pontos-strip {
            display:flex; justify-content:center; gap:24px; flex-wrap:wrap;
            padding:20px 16px; max-width:480px; margin:0 auto;
        }
        .pt-item { text-align:center; }
        .pt-value { font-family:'Cinzel',serif; font-size:1.6em; font-weight:900; line-height:1; }
        .pt-label { font-size:.78em; color:var(--text-muted); margin-top:3px; }

        /* SECTION */
        .section {
            max-width:600px; margin:0 auto; padding:0 16px;
        }
        .section-title {
            font-family:'Cinzel',serif; font-size:.78em; font-weight:700;
            color:var(--text-muted); letter-spacing:.16em; text-transform:uppercase;
            margin:28px 0 14px; padding-bottom:10px;
            border-bottom:1px solid var(--border);
        }

        /* CONQUISTA ROW */
        .conquista-item {
            display:flex; align-items:center; gap:14px;
            padding:14px 16px; margin-bottom:10px;
            background:var(--bg-card); border:1px solid rgba(255,255,255,0.05);
            border-radius:7px;
        }
        .conquista-item.has-title {
            border-color:var(--border);
        }
        .ci-img {
            width:56px; height:56px; border-radius:5px; flex-shrink:0;
            overflow:hidden; border:1px solid rgba(200,134,10,0.15);
            background:rgba(200,134,10,0.04);
            display:flex; align-items:center; justify-content:center;
        }
        .ci-img img { width:100%; height:100%; object-fit:cover; }
        .ci-img-placeholder { font-size:1.6em; opacity:.3; }
        .ci-info { flex:1; min-width:0; }
        .ci-category {
            font-size:.75em; color:var(--text-muted);
            text-transform:uppercase; letter-spacing:.1em; margin-bottom:3px;
        }
        .ci-title {
            font-family:'Cinzel',serif; font-size:.95em; font-weight:700;
            color:var(--text-bright); line-height:1.25; margin-bottom:4px;
        }
        .ci-count {
            font-size:.82em; color:var(--amber-dim);
        }
        .ci-pts {
            font-family:'Cinzel',serif; font-size:1.1em; font-weight:700;
            flex-shrink:0; min-width:48px; text-align:right;
        }
        .ci-pts.pos { color:#4A8C5C; }
        .ci-pts.neg { color:#8C3A3A; }

        /* PROGRESS */
        .progress-section { margin-bottom:10px; }
        .progress-item {
            padding:12px 16px; margin-bottom:8px;
            background:rgba(200,134,10,0.04); border:1px solid rgba(200,134,10,0.1);
            border-radius:6px;
        }
        .progress-label {
            font-family:'Cinzel',serif; font-size:.82em; color:var(--amber);
            margin-bottom:8px;
        }
        .progress-bar-wrap {
            background:rgba(255,255,255,0.06); border-radius:3px; height:6px; overflow:hidden;
        }
        .progress-bar {
            height:100%; border-radius:3px; transition:width .6s ease;
        }
        .progress-text {
            font-size:.78em; color:var(--text-muted); margin-top:5px;
        }

        /* LOCKED */
        .locked-notice {
            text-align:center; padding:32px 20px;
            font-style:italic; color:var(--text-muted); font-size:.95em; line-height:1.6;
        }
        .locked-notice strong { color:var(--amber); font-style:normal; }

        /* FOOTER */
        footer {
            margin-top:40px; padding:20px; text-align:center;
            border-top:1px solid rgba(200,134,10,0.08);
        }
        .footer-quote { font-style:italic; color:var(--amber-dim); font-size:.9em; }
    </style>
</head>

</div>

<footer>

<script>
// ═══════════════════════════════════════════════════

const TITLE_IMAGES = {
    '⚔️ Cavaleiro da Companhia':        'cavaleiro-da-companhia',
    '🛡️ Senhor dos Cavaleiros de Rohan': 'senhor-dos-cavaleiros-de-rohan',
    '👑 Herdeiro de Isildur':            'herdeiro-de-isildur',
    '✨ Rei Coroado de Gondor':           'rei-coroado-de-gondor',

    '⚡ Portador de Glamdring':           'portador-de-glamdring',
    '🎯 Guardião da Torre Branca':        'guardiao-da-torre-branca',

    '💎 Lorde Comandante da Muralha':     'lorde-comandante-da-muralha',

    '💫 Protetor dos Sete Reinos':        'protetor-dos-sete-reinos',
    '🔥 Portador da Ferroada':            'portador-da-ferroada',
    '⚔️ Empunhador de Andúril':           'empunhador-de-anduril',
    '🌟 Cavaleiro do Amanhecer':          'cavaleiro-do-amanhecer',
    '💎 Portador da Garra Longa':         'portador-da-garra-longa',
    '⚡ Portador da Espada de Fogo':      'portador-da-espada-de-fogo',
    '🗡️ Conquistador de Terras':          'conquistador-de-terras',
    '⚔️ O Senhor do Aço Negro':           'o-senhor-do-aco-negro',
    '📱 Flagelo dos Reinos':              'flagelo-dos-reinos',
    '🐉 Terror de Westeros':              'terror-de-westeros',
    '🦅 Cavaleiro do Corvo Branco':       'cavaleiro-do-corvo-branco',
    '🐉 Renascido no Fogo':               'renascido-no-fogo',
    '⚡ Jon Snow Ressuscitado':            'jon-snow-ressuscitado',
    '🌟 Ressurgido das Trevas':            'ressurgido-das-trevas',
    '🗡️ Banido para o Exílio':            'banido-para-o-exilio',
    '⚰️ Habitante das Terras Sombrias':   'habitante-das-terras-sombrias',
    '💀 Servo de Sauron':                 'servo-de-sauron',
    '🌑 Prisioneiro de Mordor':           'prisioneiro-de-mordor',
    '🕳️ Rei da Noite Eterna':             'rei-da-noite-eterna',
    '📰 Escudeiro Sem Nome':              'escudeiro-sem-nome',
};

function imgSlug(title) { return TITLE_IMAGES[title] || null; }

function imgEl(title, size=56) {
    const slug = imgSlug(title);
    if (!slug) return `<div class="ci-img-placeholder">⚔️</div>`;
    return `<img src="imagens/titulos/${slug}.jpg" alt="${title}"
                 style="width:100%;height:100%;object-fit:cover"
                 onerror="this.parentElement.innerHTML='<div class=\\'ci-img-placeholder\\'>⚔️</div>'"
                 loading="lazy">`;
}

function getTierTitle(type, count) {
    if (!count) return null;
    const data = TITLES_DATA[type];
    for (const tier of data.tiers) if (count >= tier.min) return tier;
    return null;
}

function getNextTier(type, count) {
    const data = TITLES_DATA[type];
    const tiers = [...data.tiers].reverse();
    for (const tier of tiers) if (count < tier.min) return tier;
    return null;
}

function getPrimaryTitle(lord) {
    return getTierTitle('mvp', lord.mvp)?.t ||
           getTierTitle('mitada', lord.mitada)?.t ||
           getTierTitle('recuperacao', lord.recuperacao)?.t ||
           getTierTitle('massacre', lord.massacre)?.t ||
           getTierTitle('podio', lord.podio)?.t ||
           getTierTitle('lanterna', lord.lanterna)?.t ||
           '📰 Escudeiro Sem Nome';
}

// ═══════════════════════════════════════════════════
// PARSE & PROCESS
// ═══════════════════════════════════════════════════
function parseCSV(text) {
    const rows = [];
    const lines = text.trim().split('\n');
    for (let i = 1; i < lines.length; i++) {
        const parts = lines[i].trim().split(',');
        if (parts.length < 3) continue;
        const rodada = parseInt(parts[0].trim());
        const time   = parts[1].trim();
        const pontos = parseFloat(parts[2].trim());
        if (!isNaN(rodada) && time && !isNaN(pontos)) rows.push({ rodada, time, pontos });
    }
    return rows;
}

function buildBattles(rows) {
    const map = {};
    rows.forEach(r => {
        if (!map[r.rodada]) map[r.rodada] = [];
        map[r.rodada].push({ name: r.time, points: r.pontos });
    });
    return Object.keys(map).map(Number).sort((a,b)=>a-b).map(week => ({
        week, results: map[week], medievalActive: week >= MEDIEVAL_START,
    }));
}

function processLord(BATTLES, targetName) {
    const lord = { mvp:0, podio:0, mitada:0, recuperacao:0, massacre:0, lanterna:0, bonusG2:0, cartolaPoints:0 };

    BATTLES.forEach(b => {
        b.results.forEach(r => {
            if (r.name.toLowerCase().trim() === targetName.toLowerCase().trim())
                lord.cartolaPoints += r.points;
        });
    });

    const fullAcum = {}; LORDS.forEach(l => fullAcum[l.name]=0);
    const acumByRound = {};
    BATTLES.forEach(battle => {
        battle.results.forEach(r => fullAcum[r.name] = (fullAcum[r.name]||0) + r.points);
        acumByRound[battle.week] = {...fullAcum};
    });

    const activeRounds = BATTLES.filter(b => b.medievalActive);
    let prev = {};

    activeRounds.forEach((battle, idx) => {
        const sorted = [...battle.results].sort((a,b)=>b.points-a.points);
        const prevRound = BATTLES.find(b => b.week === battle.week - 1);
        let beforeSnap = {};
        if (prevRound) {
            beforeSnap = acumByRound[prevRound.week];
        } else {
            const prevInactive = BATTLES.filter(b => !b.medievalActive && b.week < battle.week);
            if (prevInactive.length) beforeSnap = acumByRound[Math.max(...prevInactive.map(b=>b.week))];
            else LORDS.forEach(l => beforeSnap[l.name]=0);
        }
        const afterSnap = acumByRound[battle.week];
        const rankB = Object.entries(beforeSnap).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
        const rankA = Object.entries(afterSnap ).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
        const posB  = {}; rankB.forEach((n,i) => posB[n]=i);
        const posA  = {}; rankA.forEach((n,i) => posA[n]=i);

        sorted.forEach((r, pos) => {
            if (r.name.toLowerCase().trim() !== targetName.toLowerCase().trim()) return;
            if (pos===0 && r.points>0) lord.mvp++;
            if (pos===1||pos===2) lord.podio++;
            if (r.points>=80) {
                lord.mitada++;
                if      (r.points>=110) lord.bonusG2+=14;
                else if (r.points>=100) lord.bonusG2+=8;
                else if (r.points>=90)  lord.bonusG2+=4;
            }
            if (pos===sorted.length-1 && r.points>0) lord.lanterna++;
            if (idx>0 && (prev[r.name]||0)>0 && (r.points - prev[r.name])>=50) lord.recuperacao++;
            if (idx>0 && (posB[r.name]??999)>(posA[r.name]??999)) {
                let hm = false;
                LORDS.forEach(o => {
                    if (o.name===r.name) return;
                    if ((posB[r.name]??999)>(posB[o.name]??999) && (posA[r.name]??999)<(posA[o.name]??999))
                        if (((afterSnap[r.name]||0)-(afterSnap[o.name]||0))>=10) hm=true;
                });
                if (hm) lord.massacre++;
            }
        });
        battle.results.forEach(r => prev[r.name]=r.points);
    });

    function calcMedieval(a) {
        let p = 0;
        const {mvp=0,podio=0,mitada=0,recuperacao=0,massacre=0,lanterna=0} = a;
        if      (mvp>=15) p+=200; else if(mvp>=10) p+=135; else if(mvp>=7) p+=95;
        else if (mvp>=5)  p+=65;  else if(mvp>=3)  p+=40;  else p+=mvp*10;
        if      (podio>=15) p+=75; else if(podio>=10) p+=45; else if(podio>=8) p+=34;
        else if (podio>=5)  p+=20; else p+=podio*3;
        if      (mitada>=10) p+=100; else if(mitada>=7) p+=70; else if(mitada>=5) p+=45;
        else if (mitada>=3)  p+=23;  else p+=mitada*5;
        if      (recuperacao>=7) p+=96; else if(recuperacao>=5) p+=65; else if(recuperacao>=3) p+=36;
        else p+=recuperacao*8;
        if      (massacre>=7) p+=62; else if(massacre>=5) p+=40; else if(massacre>=3) p+=22;
        else p+=massacre*6;
        if      (lanterna>=10) p-=100; else if(lanterna>=7) p-=70; else if(lanterna>=5) p-=45;
        else if (lanterna>=3)  p-=23;  else p-=lanterna*5;
        return p;
    }

    const lastRound = BATTLES.length ? Math.max(...BATTLES.map(b=>b.week)) : 0;
    const locked = lastRound < MEDIEVAL_START;
    lord.medievalPoints = locked ? 0 : calcMedieval(lord) + lord.bonusG2;
    lord.totalPoints = lord.cartolaPoints + lord.medievalPoints;
    lord.locked = locked;
    lord.lastRound = lastRound;
    return lord;
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(lordConfig, stats) {
    document.title = `${lordConfig.name} — Guerra dos Reinos`;

    // Hero
    document.getElementById('color-bar').style.background = lordConfig.color;
    document.getElementById('hero-avatar').textContent = lordConfig.avatar;
    document.getElementById('hero-name').textContent = lordConfig.name;
    document.getElementById('hero-house').innerHTML = `<span style="color:${lordConfig.color}">${lordConfig.house}</span>`;
    document.getElementById('hero-alliance').innerHTML = lordConfig.alliance === 'bastardos'
        ? `<span class="hero-alliance tag-bastardos">🗡️ Os Bastardos</span>`
        : `<span class="hero-alliance tag-anel">💍 Sociedade do Anel</span>`;

    const primaryTitle = stats.locked ? '📰 Escudeiro Sem Nome' : getPrimaryTitle(stats);

    // Primary title card
    const slug = imgSlug(primaryTitle);
    const imgWrap = document.getElementById('ptc-img-wrap');
    if (slug) {
        imgWrap.innerHTML = `<img class="ptc-img" src="imagens/titulos/${slug}.jpg" alt="${primaryTitle}"
            onerror="this.outerHTML='<div class=\\'ptc-img-placeholder\\'>⚔️</div>'">`;
    } else {
        imgWrap.innerHTML = `<div class="ptc-img-placeholder">⚔️</div>`;
    }
    document.getElementById('ptc-title').textContent = primaryTitle;

    // Pontos
    const medSign = stats.medievalPoints >= 0 ? '+' : '';
    const medColor = stats.medievalPoints > 0 ? '#4A8C5C' : stats.medievalPoints < 0 ? '#8C3A3A' : '#555';
    document.getElementById('pontos-strip').innerHTML = `
        <div class="pt-item">
            <div class="pt-value" style="color:var(--amber-light)">${stats.totalPoints.toFixed(2)}</div>
            <div class="pt-label">Total</div>
        </div>
        <div class="pt-item">
            <div class="pt-value" style="color:#4A8C5C">${stats.cartolaPoints.toFixed(2)}</div>
            <div class="pt-label">📊 Cartola</div>
        </div>
        <div class="pt-item">
            <div class="pt-value" style="color:${medColor}">${medSign}${stats.medievalPoints}</div>
            <div class="pt-label">⚔️ Medieval</div>
        </div>`;

    // Conquistas
    if (stats.locked) {
        document.getElementById('conquistas-section').innerHTML =
            `<div class="locked-notice">⏳ Conquistas medievais ativam na <strong>Rodada ${MEDIEVAL_START}</strong>.</div>`;
        document.getElementById('proximos-section').style.display = 'none';
        return;
    }

    const conquistas = [];
    const proximos = [];

    for (const [key, data] of Object.entries(TITLES_DATA)) {
        const count = stats[key] || 0;
        const current = getTierTitle(key, count);
        const next = getNextTier(key, count);

        if (current) {
            const isNeg = data.label === 'Lanterna';
            conquistas.push(`
                <div class="conquista-item has-title">
                    <div class="ci-img">${imgEl(current.t)}</div>
                    <div class="ci-info">
                        <div class="ci-category" style="color:${data.color}">${data.icon} ${data.label}</div>
                        <div class="ci-title">${current.t}</div>
                        <div class="ci-count">${count}x ocorrência${count>1?'s':''}</div>
                    </div>
                    <div class="ci-pts ${isNeg?'neg':'pos'}">${current.pts > 0 ? '+' : ''}${current.pts}</div>
                </div>`);
        }

        if (next && count > 0) {
            const pct = Math.min(100, Math.round((count / next.min) * 100));
            proximos.push(`
                <div class="progress-item">
                    <div class="progress-label">${data.icon} ${data.label} → ${next.t}</div>
                    <div class="progress-bar-wrap">
                        <div class="progress-bar" style="width:${pct}%;background:${data.color}"></div>
                    </div>
                    <div class="progress-text">${count} de ${next.min} — faltam ${next.min - count}</div>
                </div>`);
        } else if (!current && count === 0) {
            const firstTier = data.tiers[data.tiers.length - 1];
            proximos.push(`
                <div class="progress-item">
                    <div class="progress-label">${data.icon} ${data.label} → ${firstTier.t}</div>
                    <div class="progress-bar-wrap">
                        <div class="progress-bar" style="width:0%;background:${data.color}"></div>
                    </div>
                    <div class="progress-text">0 de ${firstTier.min} — ainda não desbloqueado</div>
                </div>`);
        }
    }

    document.getElementById('conquistas-list').innerHTML =
        conquistas.length ? conquistas.join('') : `<div style="color:var(--text-muted);font-style:italic;padding:16px 0">Nenhuma conquista ainda.</div>`;
    document.getElementById('proximos-list').innerHTML =
        proximos.length ? proximos.join('') : `<div style="color:var(--text-muted);font-style:italic;padding:16px 0">Todos os títulos possíveis já foram alcançados!</div>`;
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init() {
    const params = new URLSearchParams(window.location.search);
    const timeName = params.get('time');
    if (!timeName) { window.location.href = 'titulos.html'; return; }

    const lordConfig = LORDS.find(l => l.name.toLowerCase() === timeName.toLowerCase());
    if (!lordConfig) { window.location.href = 'titulos.html'; return; }

    try {
        const res = await fetch('dados.csv?v=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const csv = await res.text();
        const rows = parseCSV(csv);
        const BATTLES = buildBattles(rows);
        const stats = processLord(BATTLES, lordConfig.name);

        render(lordConfig, stats);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main').style.display = 'block';
    } catch(err) {
        document.getElementById('loading').innerHTML = `
            <div style="font-size:2em">🏚️</div>
            <div style="font-family:Cinzel,serif;color:#e74c3c;font-size:1.1em">Erro ao carregar</div>
            <div style="color:#6B6878;font-size:.9em;max-width:300px;text-align:center;line-height:1.6">${err.message}</div>`;
    }
}
document.addEventListener('DOMContentLoaded', init);
</script>
