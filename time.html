<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1A0A00">
    <title>Conquistas — Guerra dos Reinos</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --tier-s:#F0C040; --tier-s-dim:#A07820; --tier-s-glow:rgba(240,192,64,0.25);
            --tier-a:#C02020; --tier-a-dim:#7A1010; --tier-a-glow:rgba(192,32,32,0.25);
            --tier-b:#4169E1; --tier-b-dim:#2A40A0; --tier-b-glow:rgba(65,105,225,0.25);
            --tier-c:#8B30C8; --tier-c-dim:#4D0072; --tier-c-glow:rgba(139,48,200,0.25);
            --tier-d:#5A5A5A; --tier-d-dim:#3A3A3A; --tier-d-glow:rgba(90,90,90,0.15);
            --gold:#F0C040; --gold-bright:#FFE080; --gold-dim:#A07820; --gold-dark:#5A3E08;
            --brown-rich:#1A0800; --text-bright:#FFE8B0; --text:#D4B878; --text-muted:#8A7040;
            --card-border:#6B4010;
        }
        body{font-family:'Crimson Text',Georgia,serif;background:var(--brown-rich);background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px),repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,0,0,0.02) 2px,rgba(0,0,0,0.02) 4px),radial-gradient(ellipse 100% 50% at 50% 0%,rgba(180,80,0,0.2) 0%,transparent 55%),linear-gradient(180deg,#1A0800 0%,#100500 60%,#1A0800 100%);color:var(--text);min-height:100vh;padding-bottom:80px;font-size:18px;}

        #loading{position:fixed;inset:0;background:linear-gradient(135deg,#1A0800,#0D0400);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px;}
        .loading-icon{font-size:4em;animation:pulse 1.4s ease-in-out infinite;}
        .loading-text{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:1em;letter-spacing:.15em;text-shadow:0 0 20px rgba(240,192,64,0.4);}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}

        .back-bar{padding:14px 16px;border-bottom:1px solid rgba(240,192,64,0.1);background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:space-between;}
        .back-link{display:inline-flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:.82em;color:var(--text-muted);text-decoration:none;padding:10px 16px;border:1px solid rgba(240,192,64,0.15);border-radius:6px;background:rgba(0,0,0,0.3);-webkit-tap-highlight-color:transparent;}
        .back-link:active{color:var(--gold);border-color:var(--gold-dim);}
        .share-btn{display:inline-flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:.82em;font-weight:700;color:#25D366;text-decoration:none;padding:10px 16px;border:1px solid rgba(37,211,102,0.3);border-radius:6px;background:rgba(37,211,102,0.06);-webkit-tap-highlight-color:transparent;}
        .share-btn:active{background:rgba(37,211,102,0.14);}

        /* HERO */
        .hero{text-align:center;padding:44px 20px 32px;position:relative;overflow:hidden;}
        .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 50% 0%,var(--hero-glow,rgba(200,100,0,0.2)) 0%,transparent 65%);pointer-events:none;}
        .hero::after{content:'';position:absolute;bottom:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),var(--gold),var(--gold-dim),transparent);}
        .hero-color-bar{position:absolute;top:0;left:0;right:0;height:5px;}
        .hero-avatar{font-size:4.5em;margin-bottom:14px;line-height:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.8));}
        .hero-name{font-family:'Cinzel Decorative',serif;font-size:clamp(1.5em,5.5vw,2.2em);font-weight:900;color:var(--gold-bright);letter-spacing:.05em;margin-bottom:7px;text-shadow:0 0 30px rgba(255,200,50,0.35),0 2px 6px rgba(0,0,0,0.9);}
        .hero-house{font-size:1em;font-weight:600;margin-bottom:12px;font-family:'Cinzel',serif;letter-spacing:.04em;}
        .hero-alliance{display:inline-block;font-family:'Cinzel',serif;font-size:.82em;padding:5px 18px;border-radius:20px;font-weight:700;letter-spacing:.05em;}
        .tag-bastardos{background:rgba(80,90,100,0.25);border:1px solid rgba(176,190,197,0.4);color:#9AAAB8;}
        .tag-anel{background:rgba(20,80,50,0.25);border:1px solid rgba(76,175,128,0.4);color:#4CAF80;}
        .tag-northclaw{background:rgba(100,60,10,0.25);border:1px solid rgba(232,160,64,0.4);color:#E8A040;}

        .wrap{max-width:600px;margin:0 auto;padding:0 16px;}

        /* TÍTULO PRINCIPAL */
        .primary-card{margin:28px 0 0;background:linear-gradient(160deg,#2A1205,#1A0900,#2A1205);border:2px solid var(--card-border);border-radius:14px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.8);display:flex;align-items:stretch;position:relative;}
        .primary-card::before{content:'';position:absolute;inset:0;border-radius:14px;background:radial-gradient(circle at 0% 0%,rgba(240,192,64,0.07) 0%,transparent 40%),radial-gradient(circle at 100% 100%,rgba(240,192,64,0.04) 0%,transparent 40%);pointer-events:none;}
        /* tier border colors */
        .primary-card.tier-s{border-color:var(--tier-s-dim);box-shadow:0 16px 48px rgba(0,0,0,0.8),0 0 24px var(--tier-s-glow);}
        .primary-card.tier-a{border-color:var(--tier-a-dim);box-shadow:0 16px 48px rgba(0,0,0,0.8),0 0 20px var(--tier-a-glow);}
        .primary-card.tier-b{border-color:var(--tier-b-dim);box-shadow:0 16px 48px rgba(0,0,0,0.8),0 0 16px var(--tier-b-glow);}
        .primary-card.tier-c{border-color:var(--tier-c-dim);box-shadow:0 16px 48px rgba(0,0,0,0.8),0 0 16px var(--tier-c-glow);}
        .primary-card.tier-d{border-color:#2A2A2A;box-shadow:0 16px 48px rgba(0,0,0,0.8);}

        .ptc-img-wrap{width:120px;min-height:120px;flex-shrink:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;overflow:hidden;border-right:1px solid rgba(240,192,64,0.1);}
        .ptc-img{width:120px;height:120px;object-fit:contain;display:block;}
        .ptc-img-placeholder{font-size:3.2em;opacity:.2;}
        .ptc-body{padding:20px 22px;flex:1;}
        .ptc-tier-badge{font-family:'Cinzel',serif;font-size:.68em;font-weight:700;padding:2px 10px;border-radius:20px;letter-spacing:.1em;display:inline-block;margin-bottom:8px;}
        .ptc-label{font-family:'Cinzel',serif;font-size:.68em;color:var(--gold-dim);letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;}
        .ptc-title{font-family:'Cinzel',serif;font-size:1.1em;font-weight:700;line-height:1.35;}
        .tier-s-text{color:var(--tier-s);text-shadow:0 0 16px rgba(240,192,64,0.3);}
        .tier-a-text{color:var(--tier-a);text-shadow:0 0 12px rgba(192,32,32,0.3);font-weight:900;}
        .tier-b-text{color:var(--tier-b);}
        .tier-c-text{color:var(--tier-c);font-style:italic;}
        .tier-d-text{color:var(--tier-d);opacity:.6;}

        /* CONTADOR DE TÍTULOS */
        .title-counter{
            margin:18px 0 0;
            padding:16px 20px;
            background:linear-gradient(135deg,#221005,#1A0900);
            border:1px solid rgba(240,192,64,0.15);
            border-radius:12px;
            display:flex; align-items:center; gap:16px;
        }
        .counter-icon{font-size:2em;flex-shrink:0;}
        .counter-info{flex:1;}
        .counter-label{font-family:'Cinzel',serif;font-size:.72em;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;}
        .counter-bar-wrap{background:rgba(0,0,0,0.5);border-radius:6px;height:10px;overflow:hidden;border:1px solid rgba(240,192,64,0.1);margin-bottom:6px;}
        .counter-bar{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width .8s ease;position:relative;}
        .counter-bar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.15);border-radius:6px 6px 0 0;}
        .counter-numbers{font-family:'Cinzel Decorative',serif;font-size:1.4em;font-weight:900;color:var(--gold-bright);text-shadow:0 0 12px rgba(240,192,64,0.3);flex-shrink:0;}
        .counter-sub{font-size:.82em;color:var(--text-muted);}

        /* PONTOS */
        .pontos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:18px 0 0;}
        .pt-item{text-align:center;padding:16px 8px;background:linear-gradient(160deg,#221005,#180800);border:1px solid rgba(240,192,64,0.12);border-radius:10px;box-shadow:inset 0 1px 0 rgba(240,192,64,0.06);}
        .pt-value{font-family:'Cinzel',serif;font-size:1.45em;font-weight:900;line-height:1;}
        .pt-label{font-size:.78em;color:var(--text-muted);margin-top:5px;font-family:'Cinzel',serif;letter-spacing:.04em;}

        /* SECTION */
        .section-title{font-family:'Cinzel',serif;font-size:.8em;font-weight:700;color:var(--gold-dim);letter-spacing:.18em;text-transform:uppercase;margin:32px 0 16px;padding-bottom:10px;border-bottom:1px solid rgba(240,192,64,0.15);position:relative;}
        .section-title::before{content:'✦ ';color:var(--gold-dark);}
        .section-title::after{content:' ✦';color:var(--gold-dark);}

        .shame-label{font-family:'Cinzel',serif;font-size:.78em;font-weight:700;color:var(--tier-c);letter-spacing:.14em;text-transform:uppercase;margin:28px 0 14px;padding:12px 16px;background:rgba(80,0,100,0.15);border:1px solid rgba(139,48,200,0.25);border-radius:8px;text-align:center;text-shadow:0 0 10px rgba(139,48,200,0.3);}

        /* CONQUISTA ITEM com tier */
        .conquista-item{display:flex;align-items:center;gap:16px;padding:16px;margin-bottom:12px;background:linear-gradient(135deg,#221005,#1A0900);border-radius:12px;position:relative;overflow:hidden;}
        .conquista-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--item-accent,var(--gold-dim));box-shadow:0 0 8px var(--item-accent,var(--gold-dim));}
        .conquista-item.tier-s-item{border:1px solid var(--tier-s-dim);box-shadow:0 0 12px var(--tier-s-glow);}
        .conquista-item.tier-a-item{border:1px solid var(--tier-a-dim);box-shadow:0 0 10px var(--tier-a-glow);}
        .conquista-item.tier-b-item{border:1px solid var(--tier-b-dim);}
        .conquista-item.tier-c-item{border:1px solid var(--tier-c-dim);background:linear-gradient(135deg,#1A0520,#120010);}
        .conquista-item.tier-d-item{border:1px solid #2A2A2A;opacity:.7;}

        .ci-img{width:76px;height:76px;border-radius:10px;flex-shrink:0;overflow:hidden;border:2px solid rgba(240,192,64,0.2);box-shadow:0 0 12px rgba(240,192,64,0.1),inset 0 0 8px rgba(0,0,0,0.5);background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;}
        .ci-img img{width:100%;height:100%;object-fit:contain;}
        .ci-img-placeholder{font-size:2em;opacity:.25;}
        /* tier border on ci-img */
        .tier-s-item .ci-img{border-color:var(--tier-s-dim);}
        .tier-a-item .ci-img{border-color:var(--tier-a-dim);}
        .tier-b-item .ci-img{border-color:var(--tier-b-dim);}
        .tier-c-item .ci-img{border-color:var(--tier-c-dim);}

        .ci-info{flex:1;min-width:0;}
        .ci-tier-badge{font-family:'Cinzel',serif;font-size:.62em;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.08em;display:inline-block;margin-bottom:4px;}
        .badge-s{background:rgba(240,192,64,0.12);border:1px solid var(--tier-s-dim);color:var(--tier-s);}
        .badge-a{background:rgba(192,32,32,0.12);border:1px solid var(--tier-a-dim);color:var(--tier-a);}
        .badge-b{background:rgba(65,105,225,0.12);border:1px solid var(--tier-b-dim);color:var(--tier-b);}
        .badge-c{background:rgba(139,48,200,0.12);border:1px solid var(--tier-c-dim);color:var(--tier-c);}
        .badge-d{background:rgba(90,90,90,0.12);border:1px solid #3A3A3A;color:#888;}

        .ci-category{font-size:.75em;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;font-family:'Cinzel',serif;}
        .ci-title{font-family:'Cinzel',serif;font-size:1em;font-weight:700;line-height:1.3;margin-bottom:5px;}
        .ci-count{font-size:.85em;color:var(--gold-dark);}
        .ci-pts{font-family:'Cinzel Decorative',serif;font-size:1.15em;font-weight:900;flex-shrink:0;min-width:52px;text-align:right;}
        .ci-pts.pos{color:#4A9C5C;text-shadow:0 0 8px rgba(74,156,92,0.4);}
        .ci-pts.neg{color:var(--tier-c);text-shadow:0 0 8px rgba(139,48,200,0.4);}

        /* PROGRESSO */
        .progress-item{padding:18px;margin-bottom:12px;background:linear-gradient(135deg,#1E0D04,#160800);border:1px solid rgba(240,192,64,0.1);border-radius:12px;}
        .progress-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
        .progress-ci-img{width:56px;height:56px;border-radius:8px;flex-shrink:0;overflow:hidden;border:1px solid rgba(240,192,64,0.15);background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;opacity:.5;filter:grayscale(40%);}
        .progress-ci-img img{width:100%;height:100%;object-fit:contain;}
        .progress-ci-placeholder{font-size:1.6em;opacity:.3;}
        .progress-info{flex:1;}
        .progress-label{font-family:'Cinzel',serif;font-size:.92em;font-weight:700;margin-bottom:3px;line-height:1.3;}
        .progress-sublabel{font-size:.82em;color:var(--text-muted);}
        .progress-bar-wrap{background:rgba(0,0,0,0.5);border-radius:6px;height:12px;overflow:hidden;margin-bottom:8px;border:1px solid rgba(240,192,64,0.1);}
        .progress-bar{height:100%;border-radius:6px;transition:width .8s ease;position:relative;}
        .progress-bar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.12);border-radius:6px 6px 0 0;}
        .progress-text{font-size:.85em;color:var(--text-muted);text-align:right;font-family:'Cinzel',serif;letter-spacing:.04em;}

        .locked-notice{text-align:center;padding:44px 20px;font-style:italic;color:var(--text-muted);font-size:1.05em;line-height:1.7;}
        .locked-notice strong{color:var(--gold);font-style:normal;}

        footer{margin-top:48px;padding:24px;text-align:center;position:relative;}
        footer::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dark),transparent);}
        .footer-quote{font-style:italic;color:var(--gold-dark);font-size:.95em;line-height:1.5;}
    </style>
</head>
<body>

<div id="loading">
    <div class="loading-icon">⚔️</div>
    <div class="loading-text">Convocando o Reino...</div>
</div>

<div id="main" style="display:none">
    <div class="back-bar">
        <a class="back-link" href="index.html">← Todos os Reinos</a>
        <a class="share-btn" id="share-btn" href="#" target="_blank">📲 Compartilhar</a>
    </div>

    <div class="hero" id="hero">
        <div class="hero-color-bar" id="color-bar"></div>
        <div class="hero-avatar" id="hero-avatar"></div>
        <div class="hero-name" id="hero-name"></div>
        <div class="hero-house" id="hero-house"></div>
        <div id="hero-alliance"></div>
    </div>

    <div class="wrap">
        <div class="primary-card" id="primary-card">
            <div class="ptc-img-wrap" id="ptc-img-wrap"></div>
            <div class="ptc-body">
                <div id="ptc-tier-badge"></div>
                <div class="ptc-label">✦ Título Atual ✦</div>
                <div class="ptc-title" id="ptc-title"></div>
            </div>
        </div>

        <!-- CONTADOR DE TÍTULOS -->
        <div class="title-counter" id="title-counter" style="display:none">
            <div class="counter-icon">🏅</div>
            <div class="counter-info">
                <div class="counter-label">Títulos Desbloqueados</div>
                <div class="counter-bar-wrap">
                    <div class="counter-bar" id="counter-bar"></div>
                </div>
                <div class="counter-sub" id="counter-sub"></div>
            </div>
            <div class="counter-numbers" id="counter-numbers"></div>
        </div>

        <div class="pontos-grid" id="pontos-grid"></div>

        <div id="conquistas-gloria-section">
            <div class="section-title">Conquistas de Glória</div>
            <div id="conquistas-gloria"></div>
        </div>

        <div id="conquistas-vergonha-section" style="display:none">
            <div class="shame-label">☠️ Marcas de Vergonha ☠️</div>
            <div id="conquistas-vergonha"></div>
        </div>

        <div id="proximos-section">
            <div class="section-title">Próximos Títulos</div>
            <div id="proximos-list"></div>
        </div>
    </div>
</div>

<footer>
    <div class="footer-quote">"A glória não se mede apenas em pontos, mas em conquistas eternas!"</div>
</footer>

<script>
const MEDIEVAL_START=6;
const LORDS=[
    {name:'Icebergteam',     house:'Forja Polar',         avatar:'❄️', color:'#00CED1',alliance:'anel'},
    {name:'Sons of Númenor', house:'Herdeiros de Elendil', avatar:'🛡️', color:'#4169E1',alliance:'bastardos'},
    {name:'Ironverdict',     house:'Forja da Justiça',     avatar:'🗡️', color:'#9a9a9a',alliance:'bastardos'},
    {name:'CEEC',            house:'Mestre das Espadas',   avatar:'⚔️', color:'#CC2222',alliance:'northclaw'},
    {name:'Otopatamá',       house:'Samurais Guerreiros',  avatar:'🤖', color:'#1E90FF',alliance:'northclaw'},
    {name:'Andorinha Jr',    house:'Jovem Veloz',          avatar:'🐦', color:'#FF6347',alliance:'anel'},
    {name:'Andorinha',       house:'Senhores do Voo',      avatar:'🦅', color:'#DC143C',alliance:'anel'},
    {name:'Varelitas',       house:'Guardas da Colina',    avatar:'🦊', color:'#3CB054',alliance:'bastardos'},
    {name:'Lobonegro',       house:'Agente do Caos',       avatar:'🐺', color:'#9A6AF0',alliance:'bastardos'},
];

const TITLES_DATA={
    mvp:{label:'MVP',icon:'🏆',color:'#F0C040',tier:'S',vergonha:false,tiers:[{min:15,pts:200,t:'⚡ Portador de Glamdring'},{min:10,pts:135,t:'🐉 O Rei que Voltou'},{min:7,pts:95,t:'✨ Rei Coroado de Gondor'},{min:5,pts:65,t:'👑 Herdeiro de Isildur'},{min:3,pts:40,t:'🛡️ Senhor dos Cavaleiros de Rohan'},{min:1,pts:10,t:'⚔️ Cavaleiro da Companhia'}]},
    podio:{label:'Pódio',icon:'🥇',color:'#4169E1',tier:'B',vergonha:false,tiers:[{min:15,pts:75,t:'💫 Protetor dos Sete Reinos'},{min:10,pts:45,t:'🎖️ Mão do Rei'},{min:8,pts:34,t:'💎 Lorde Comandante da Muralha'},{min:5,pts:20,t:'🏅 Cavaleiro da Guarda Real'},{min:1,pts:3,t:'🎯 Guardião da Torre Branca'}]},
    mitada:{label:'Mitada',icon:'💀',color:'#C02020',tier:'A',vergonha:false,tiers:[{min:10,pts:100,t:'⚡ Portador da Espada de Fogo'},{min:7,pts:70,t:'💎 Portador da Garra Longa'},{min:5,pts:45,t:'🌟 Cavaleiro do Amanhecer'},{min:3,pts:23,t:'⚔️ Empunhador de Andúril'},{min:1,pts:5,t:'🔥 Portador da Ferroada'}]},
    massacre:{label:'Massacre',icon:'🗡️',color:'#C02020',tier:'A',vergonha:false,tiers:[{min:7,pts:62,t:'🐉 Terror de Westeros'},{min:5,pts:40,t:'📱 Flagelo dos Reinos'},{min:3,pts:22,t:'⚔️ O Senhor do Aço Negro'},{min:1,pts:6,t:'🗡️ Conquistador de Terras'}]},
    recuperacao:{label:'Recuperação',icon:'📈',color:'#4169E1',tier:'B',vergonha:false,tiers:[{min:7,pts:96,t:'🌟 Ressurgido das Trevas'},{min:5,pts:65,t:'⚡ Jon Snow Ressuscitado'},{min:3,pts:36,t:'🐉 Renascido no Fogo'},{min:1,pts:8,t:'🦅 Cavaleiro do Corvo Branco'}]},
    lanterna:{label:'Lanterna',icon:'📦',color:'#8B30C8',tier:'C',vergonha:true,tiers:[{min:10,pts:-100,t:'🕳️ Rei da Noite Eterna'},{min:7,pts:-70,t:'🌑 Prisioneiro de Mordor'},{min:5,pts:-45,t:'💀 Servo de Sauron'},{min:3,pts:-23,t:'⚰️ Habitante das Terras Sombrias'},{min:1,pts:-5,t:'🗡️ Banido para o Exílio'}]},
};

// Total de títulos possíveis nas 6 categorias (excluindo finais de temporada)
const TOTAL_POSSIVEIS = Object.values(TITLES_DATA).reduce((s,d)=>s+d.tiers.length,0); // 29

const TITLE_IMAGES={'⚔️ Cavaleiro da Companhia':'cavaleiro-da-companhia','🛡️ Senhor dos Cavaleiros de Rohan':'senhor-dos-cavaleiros-de-rohan','👑 Herdeiro de Isildur':'herdeiro-de-isildur','✨ Rei Coroado de Gondor':'rei-coroado-de-gondor','🐉 O Rei que Voltou':'o-rei-que-voltou','⚡ Portador de Glamdring':'portador-de-glamdring','🎯 Guardião da Torre Branca':'guardiao-da-torre-branca','🏅 Cavaleiro da Guarda Real':'cavaleiro-da-guarda-real','💎 Lorde Comandante da Muralha':'lorde-comandante-da-muralha','🎖️ Mão do Rei':'mao-do-rei','💫 Protetor dos Sete Reinos':'protetor-dos-sete-reinos','🔥 Portador da Ferroada':'portador-da-ferroada','⚔️ Empunhador de Andúril':'empunhador-de-anduril','🌟 Cavaleiro do Amanhecer':'cavaleiro-do-amanhecer','💎 Portador da Garra Longa':'portador-da-garra-longa','⚡ Portador da Espada de Fogo':'portador-da-espada-de-fogo','🗡️ Conquistador de Terras':'conquistador-de-terras','⚔️ O Senhor do Aço Negro':'o-senhor-do-aco-negro','📱 Flagelo dos Reinos':'flagelo-dos-reinos','🐉 Terror de Westeros':'terror-de-westeros','🦅 Cavaleiro do Corvo Branco':'cavaleiro-do-corvo-branco','🐉 Renascido no Fogo':'renascido-no-fogo','⚡ Jon Snow Ressuscitado':'jon-snow-ressuscitado','🌟 Ressurgido das Trevas':'ressurgido-das-trevas','🗡️ Banido para o Exílio':'banido-para-o-exilio','⚰️ Habitante das Terras Sombrias':'habitante-das-terras-sombrias','💀 Servo de Sauron':'servo-de-sauron','🌑 Prisioneiro de Mordor':'prisioneiro-de-mordor','🕳️ Rei da Noite Eterna':'rei-da-noite-eterna','📰 Escudeiro Sem Nome':'escudeiro-sem-nome'};

function imgSlug(t){return TITLE_IMAGES[t]||null;}
function imgEl(t){const s=imgSlug(t);if(!s)return`<div class="ci-img-placeholder">⚔️</div>`;return`<img src="imagens/titulos/${s}.jpg" alt="${t}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentElement.innerHTML='<div class=\\'ci-img-placeholder\\'>⚔️</div>'" loading="lazy">`;}
function imgProgress(t){const s=imgSlug(t);if(!s)return`<div class="progress-ci-placeholder">⚔️</div>`;return`<img src="imagens/titulos/${s}.jpg" alt="${t}" style="width:100%;height:100%;object-fit:contain" onerror="this.parentElement.innerHTML='<div class=\\'progress-ci-placeholder\\'>⚔️</div>'" loading="lazy">`;}
function getTier(type,count){if(!count)return null;for(const t of TITLES_DATA[type].tiers)if(count>=t.min)return t;return null;}
function getNext(type,count){const ts=[...TITLES_DATA[type].tiers].reverse();for(const t of ts)if(count<t.min)return t;return null;}
function getPrimary(l){return getTier('mvp',l.mvp)?.t||getTier('mitada',l.mitada)?.t||getTier('recuperacao',l.recuperacao)?.t||getTier('massacre',l.massacre)?.t||getTier('podio',l.podio)?.t||getTier('lanterna',l.lanterna)?.t||'📰 Escudeiro Sem Nome';}
function getPrimaryTier(l){if(l.mvp)return'S';if(l.mitada)return'A';if(l.recuperacao)return'B';if(l.massacre)return'A';if(l.podio)return'B';if(l.lanterna)return'C';return'D';}

// Contar títulos desbloqueados (cada tier dentro de cada categoria que foi alcançado)
function countUnlocked(stats){
    let count=0;
    for(const[key,data]of Object.entries(TITLES_DATA)){
        const n=stats[key]||0;
        for(const tier of data.tiers) if(n>=tier.min) count++;
    }
    return count;
}

function parseCSV(text){const rows=[];const lines=text.trim().split('\n');for(let i=1;i<lines.length;i++){const p=lines[i].trim().split(',');if(p.length<3)continue;const r=parseInt(p[0]),t=p[1].trim(),pts=parseFloat(p[2]);if(!isNaN(r)&&t&&!isNaN(pts))rows.push({rodada:r,time:t,pontos:pts});}return rows;}
function buildBattles(rows){const map={};rows.forEach(r=>{if(!map[r.rodada])map[r.rodada]=[];map[r.rodada].push({name:r.time,points:r.pontos});});return Object.keys(map).map(Number).sort((a,b)=>a-b).map(w=>({week:w,results:map[w],medievalActive:w>=MEDIEVAL_START}));}
function processLord(BATTLES,target){
    const l={mvp:0,podio:0,mitada:0,recuperacao:0,massacre:0,lanterna:0,bonusG2:0,cartolaPoints:0};
    BATTLES.forEach(b=>b.results.forEach(r=>{if(r.name.toLowerCase().trim()===target.toLowerCase().trim())l.cartolaPoints+=r.points;}));
    const fa={};LORDS.forEach(x=>fa[x.name]=0);const abr={};
    BATTLES.forEach(b=>{b.results.forEach(r=>fa[r.name]=(fa[r.name]||0)+r.points);abr[b.week]={...fa};});
    const active=BATTLES.filter(b=>b.medievalActive);let prev={};
    active.forEach((battle,idx)=>{
        const sorted=[...battle.results].sort((a,b)=>b.points-a.points);
        const pr=BATTLES.find(b=>b.week===battle.week-1);let bs={};
        if(pr)bs=abr[pr.week];else{const pi=BATTLES.filter(b=>!b.medievalActive&&b.week<battle.week);if(pi.length)bs=abr[Math.max(...pi.map(b=>b.week))];else LORDS.forEach(x=>bs[x.name]=0);}
        const as=abr[battle.week];
        const rb=Object.entries(bs).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
        const ra=Object.entries(as).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
        const pb={};rb.forEach((n,i)=>pb[n]=i);const pa={};ra.forEach((n,i)=>pa[n]=i);
        sorted.forEach((r,pos)=>{
            if(r.name.toLowerCase().trim()!==target.toLowerCase().trim())return;
            if(pos===0&&r.points>0)l.mvp++;
            if(pos===1||pos===2)l.podio++;
            if(r.points>=80){l.mitada++;if(r.points>=110)l.bonusG2+=14;else if(r.points>=100)l.bonusG2+=8;else if(r.points>=90)l.bonusG2+=4;}
            if(pos===sorted.length-1&&r.points>0)l.lanterna++;
            if(idx>0&&(prev[r.name]||0)>0&&(r.points-prev[r.name])>=50)l.recuperacao++;
            if(idx>0&&(pb[r.name]??999)>(pa[r.name]??999)){let hm=false;LORDS.forEach(o=>{if(o.name===r.name)return;if((pb[r.name]??999)>(pb[o.name]??999)&&(pa[r.name]??999)<(pa[o.name]??999))if(((as[r.name]||0)-(as[o.name]||0))>=10)hm=true;});if(hm)l.massacre++;}
        });
        battle.results.forEach(r=>prev[r.name]=r.points);
    });
    function cm(a){let p=0;const{mvp=0,podio=0,mitada=0,recuperacao=0,massacre=0,lanterna=0}=a;
        if(mvp>=15)p+=200;else if(mvp>=10)p+=135;else if(mvp>=7)p+=95;else if(mvp>=5)p+=65;else if(mvp>=3)p+=40;else p+=mvp*10;
        if(podio>=15)p+=75;else if(podio>=10)p+=45;else if(podio>=8)p+=34;else if(podio>=5)p+=20;else p+=podio*3;
        if(mitada>=10)p+=100;else if(mitada>=7)p+=70;else if(mitada>=5)p+=45;else if(mitada>=3)p+=23;else p+=mitada*5;
        if(recuperacao>=7)p+=96;else if(recuperacao>=5)p+=65;else if(recuperacao>=3)p+=36;else p+=recuperacao*8;
        if(massacre>=7)p+=62;else if(massacre>=5)p+=40;else if(massacre>=3)p+=22;else p+=massacre*6;
        if(lanterna>=10)p-=100;else if(lanterna>=7)p-=70;else if(lanterna>=5)p-=45;else if(lanterna>=3)p-=23;else p-=lanterna*5;
        return p;}
    const lastRound=BATTLES.length?Math.max(...BATTLES.map(b=>b.week)):0;
    const locked=lastRound<MEDIEVAL_START;
    l.medievalPoints=locked?0:cm(l)+l.bonusG2;
    l.totalPoints=l.cartolaPoints+l.medievalPoints;
    l.locked=locked; l.lastRound=lastRound;
    return l;
}

function tierBadgeHTML(tier){
    const labels={S:'👑 TIER S — SUPREMO',A:'⚔️ TIER A — GUERREIRO',B:'🛡️ TIER B — HONROSO',C:'💀 TIER C — INFAME',D:'📰 TIER D'};
    return`<div class="ptc-tier-badge badge-${tier.toLowerCase()}">${labels[tier]||tier}</div>`;
}

function render(cfg,stats){
    document.title=`${cfg.name} — Guerra dos Reinos`;
    const shareUrl=encodeURIComponent(window.location.href);
    const shareText=encodeURIComponent(`⚔️ ${cfg.name} na Guerra dos Reinos!\nVeja as conquistas:`);
    document.getElementById('share-btn').href=`https://wa.me/?text=${shareText}%20${shareUrl}`;

    document.getElementById('color-bar').style.background=cfg.color;
    document.getElementById('hero').style.setProperty('--hero-glow',cfg.color+'33');
    document.getElementById('hero-avatar').textContent=cfg.avatar;
    document.getElementById('hero-name').textContent=cfg.name;
    document.getElementById('hero-house').innerHTML=`<span style="color:${cfg.color}">${cfg.house}</span>`;
    let al;
    if(cfg.alliance==='bastardos')al=`<span class="hero-alliance tag-bastardos">🗡️ Os Bastardos</span>`;
    else if(cfg.alliance==='northclaw')al=`<span class="hero-alliance tag-northclaw">🦅 North Claw</span>`;
    else al=`<span class="hero-alliance tag-anel">💍 Sociedade do Anel</span>`;
    document.getElementById('hero-alliance').innerHTML=al;

    const primary=stats.locked?'📰 Escudeiro Sem Nome':getPrimary(stats);
    const primaryTier=stats.locked?'D':getPrimaryTier(stats);
    const slug=imgSlug(primary);
    document.getElementById('ptc-img-wrap').innerHTML=slug?`<img class="ptc-img" src="imagens/titulos/${slug}.jpg" alt="${primary}" onerror="this.outerHTML='<div class=\\'ptc-img-placeholder\\'>⚔️</div>'">`:`<div class="ptc-img-placeholder">⚔️</div>`;
    document.getElementById('ptc-title').textContent=primary;
    document.getElementById('ptc-title').className=`ptc-title tier-${primaryTier.toLowerCase()}-text`;
    document.getElementById('ptc-tier-badge').innerHTML=tierBadgeHTML(primaryTier);
    document.getElementById('primary-card').className=`primary-card tier-${primaryTier.toLowerCase()}`;

    // CONTADOR
    if(!stats.locked){
        const unlocked=countUnlocked(stats);
        const pct=Math.min(100,Math.round((unlocked/TOTAL_POSSIVEIS)*100));
        document.getElementById('title-counter').style.display='flex';
        document.getElementById('counter-bar').style.width=pct+'%';
        document.getElementById('counter-numbers').textContent=`${unlocked}/${TOTAL_POSSIVEIS}`;
        document.getElementById('counter-sub').textContent=`${pct}% dos títulos desbloqueados`;
    }

    // PONTOS
    const ms=stats.medievalPoints>=0?'+':'';
    const mc=stats.medievalPoints>0?'#4A9C5C':stats.medievalPoints<0?'var(--tier-c)':'#555';
    document.getElementById('pontos-grid').innerHTML=`
        <div class="pt-item"><div class="pt-value" style="color:var(--gold-bright)">${stats.totalPoints.toFixed(1)}</div><div class="pt-label">Total</div></div>
        <div class="pt-item"><div class="pt-value" style="color:#4A9C5C">${stats.cartolaPoints.toFixed(1)}</div><div class="pt-label">📊 Cartola</div></div>
        <div class="pt-item"><div class="pt-value" style="color:${mc}">${ms}${stats.medievalPoints}</div><div class="pt-label">⚔️ Medieval</div></div>`;

    if(stats.locked){
        document.getElementById('conquistas-gloria-section').innerHTML=`<div class="locked-notice">⏳ Conquistas medievais ativam na <strong>Rodada ${MEDIEVAL_START}</strong>.</div>`;
        document.getElementById('proximos-section').style.display='none';
        return;
    }

    const gloria=[],vergonha=[],proximos=[];
    for(const[key,data]of Object.entries(TITLES_DATA)){
        const count=stats[key]||0;
        const cur=getTier(key,count);
        const nxt=getNext(key,count);
        const tier=data.tier;
        if(cur){
            const html=`<div class="conquista-item tier-${tier.toLowerCase()}-item" style="--item-accent:var(--tier-${tier.toLowerCase()})">
                <div class="ci-img">${imgEl(cur.t)}</div>
                <div class="ci-info">
                    <div class="ci-tier-badge badge-${tier.toLowerCase()}">TIER ${tier}</div>
                    <div class="ci-category" style="color:var(--tier-${tier.toLowerCase()})">${data.icon} ${data.label}</div>
                    <div class="ci-title tier-${tier.toLowerCase()}-text">${cur.t}</div>
                    <div class="ci-count">${count}x ocorrência${count>1?'s':''}</div>
                </div>
                <div class="ci-pts ${data.vergonha?'neg':'pos'}">${cur.pts>0?'+':''}${cur.pts}</div>
            </div>`;
            if(data.vergonha)vergonha.push(html);else gloria.push(html);
        }
        if(nxt&&!data.vergonha){
            const pct=Math.min(100,Math.round((count/nxt.min)*100));
            proximos.push(`<div class="progress-item" style="border-color:var(--tier-${tier.toLowerCase()}-dim,rgba(240,192,64,0.1))">
                <div class="progress-header">
                    <div class="progress-ci-img">${imgProgress(nxt.t)}</div>
                    <div class="progress-info">
                        <div class="progress-label tier-${tier.toLowerCase()}-text">${nxt.t}</div>
                        <div class="progress-sublabel">${data.icon} ${data.label} · ${count} de ${nxt.min}</div>
                    </div>
                </div>
                <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%;background:linear-gradient(90deg,var(--tier-${tier.toLowerCase()}-dim),var(--tier-${tier.toLowerCase()}))"></div></div>
                <div class="progress-text">Faltam ${nxt.min-count} ocorrência${(nxt.min-count)>1?'s':''}</div>
            </div>`);
        }
    }
    document.getElementById('conquistas-gloria').innerHTML=gloria.length?gloria.join(''):`<div style="color:var(--text-muted);font-style:italic;padding:16px 0">Nenhuma conquista de glória ainda.</div>`;
    if(vergonha.length){document.getElementById('conquistas-vergonha-section').style.display='block';document.getElementById('conquistas-vergonha').innerHTML=vergonha.join('');}
    document.getElementById('proximos-list').innerHTML=proximos.length?proximos.join(''):`<div style="color:var(--text-muted);font-style:italic;padding:16px 0">Todos os títulos de glória alcançados!</div>`;
}

async function init(){
    const p=new URLSearchParams(window.location.search);
    const tn=p.get('time');
    if(!tn){window.location.href='index.html';return;}
    const cfg=LORDS.find(l=>l.name.toLowerCase()===tn.toLowerCase());
    if(!cfg){window.location.href='index.html';return;}
    try{
        const res=await fetch('dados.csv?v='+Date.now());
        if(!res.ok)throw new Error(`HTTP ${res.status}`);
        const csv=await res.text();
        const rows=parseCSV(csv);
        const BATTLES=buildBattles(rows);
        const stats=processLord(BATTLES,cfg.name);
        render(cfg,stats);
        document.getElementById('loading').style.display='none';
        document.getElementById('main').style.display='block';
    }catch(err){
        document.getElementById('loading').innerHTML=`<div style="font-size:2em">🏚️</div><div style="font-family:'Cinzel Decorative',serif;color:#e74c3c;font-size:1.1em">Erro ao carregar</div><div style="color:#8A7040;font-size:.9em;max-width:300px;text-align:center;line-height:1.6">${err.message}</div>`;
    }
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
